services:
  - type: web
    name: ensmg-siteweb
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ensmg-db
          property: connectionString
      - key: HASH_SALT
        generateValue: true
      - key: DRUPAL_ADMIN_PASS
        value: Admin@ENSMG2025

databases:
  - name: ensmg-db
    plan: free
    databaseName: ensmg_db
    user: ensmg_user
