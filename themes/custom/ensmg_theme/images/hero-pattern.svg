<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="white" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  <!-- Decorative geology-inspired shapes -->
  <polygon points="700,50 780,200 620,200" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <polygon points="50,400 150,300 250,450" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
  <circle cx="750" cy="450" r="80" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
  <circle cx="100" cy="150" r="50" fill="none" stroke="white" stroke-width="0.8" opacity="0.1"/>
  <!-- Mountain silhouette (geology theme) -->
  <polyline points="0,600 100,380 200,450 320,300 440,420 560,280 680,350 800,200 800,600" fill="rgba(255,255,255,0.03)" stroke="none"/>
</svg>
